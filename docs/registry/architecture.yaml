# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: cross_system_signal_routing
    status: active
    pattern: event_bus
    producer: any_system
    consumers:
      - any_system
    adr: docs/architecture/adr-0001-eventbus-architecture.md
    signal_hub: "EventBus autoload (src/autoloads/event_bus.gd) — 全部信号静态定义于此文件"
    usage: "subscribe: EventBus.signal_name.connect(callable) | emit: EventBus.signal_name.emit(args)"
    referenced_by:
      - docs/architecture/adr-0001-eventbus-architecture.md
    added: "2026-06-17"
    revised: ""

  - contract: scene_transition
    status: active
    pattern: direct_call
    producer: route-recruitment-system (RunManager)
    consumers:
      - SceneManager
    adr: docs/architecture/adr-0002-scene-architecture.md
    usage: "RunManager 先 emit run_phase_changed，再调用 SceneManager.goto_battle() 或 SceneManager.goto_route()"
    referenced_by:
      - docs/architecture/adr-0002-scene-architecture.md
    added: "2026-06-18"
    revised: ""

  - contract: new_scene_initialization
    status: active
    pattern: state_polling
    producer: route-recruitment-system (RunManager)
    consumers:
      - RouteRecruitUI
      - any scene node that depends on run phase
    adr: docs/architecture/adr-0002-scene-architecture.md
    usage: "新加载场景节点在 _ready() 中必须调用 _on_run_phase_changed(RunManager.current_phase) 初始化状态，不可依赖捕获已发射的 run_phase_changed 信号"
    referenced_by:
      - docs/architecture/adr-0002-scene-architecture.md
    added: "2026-06-18"
    revised: ""

  - contract: grid_coord_mapping
    status: active
    pattern: direct_call
    producer: GridCoordMapper (src/systems/board/grid_coord_mapper.gd)
    consumers:
      - any_system  # 全部需要 3D 世界坐标的系统
    adr: docs/architecture/adr-0006-3d-board-rendering.md
    usage: "坐标转换：GridCoordMapper.grid_to_world(Vector2i) → Vector3 | GridCoordMapper.world_to_grid(Vector3) → Vector2i。全项目唯一坐标转换接口，不得内联实现。"
    referenced_by:
      - docs/architecture/adr-0006-3d-board-rendering.md
    added: "2026-06-18"
    revised: ""

  - contract: unit_visual_node
    status: active
    pattern: direct_call
    producer: UnitLayer (src/systems/board/unit_layer.gd)
    consumers:
      - any_system  # 全部需要单位视觉的系统（战斗、HUD、招募/部署预览、爆发演出）
    adr: docs/architecture/adr-0007-unit-rendering.md
    usage: "单位视觉唯一节点契约：UnitView（Node3D）= 一个 UnitInstance 的 3D 呈现。
      UnitView.setup(unit_def: UnitDefinition, grid_pos: Vector2i) -> void |
      UnitView.move_to(grid_pos: Vector2i) -> void |
      UnitView.set_downed() -> void |
      UnitLayer.spawn_view(unit_def, grid_pos) -> UnitView |
      UnitLayer.get_view(unit_id: String) -> UnitView（未知 id 返回 null）。
      单位位置全程经 GridCoordMapper.grid_to_world()；拾取经 world_to_grid() + GridBoard 占用查询，零物理体。"
    referenced_by:
      - docs/architecture/adr-0007-unit-rendering.md
    added: "2026-06-18"
    revised: ""

