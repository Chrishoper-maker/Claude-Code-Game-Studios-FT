# ─── CONSTANTS ───────────────────────────────────────────────────────────────
# Named numerical values referenced across multiple systems.
# Register a constant when it is defined in one GDD but another GDD must
# agree with it (e.g., gold carry limit defined in economy but checked in
# inventory, or base inventory slots defined in inventory but displayed in HUD).
#
# Required fields: name, status, source, referenced_by, value, unit, added

constants:
  - name: MAX_CREW
    status: active
    source: design/gdd/unit-data-system.md
    referenced_by:
      - design/gdd/unit-data-system.md
      - design/gdd/game-concept.md   # 反支柱：船员永不超过 8
    value: 8
    unit: 船员
    added: 2026-06-13
    revised: ""

  - name: CLASS_COUNT
    status: active
    source: design/gdd/unit-data-system.md
    referenced_by:
      - design/gdd/unit-data-system.md
    value: 6
    unit: 职业
    added: 2026-06-13
    revised: ""

  - name: DEPLOY_LIMIT
    status: active
    source: design/gdd/unit-data-system.md
    referenced_by:
      - design/gdd/unit-data-system.md
    value: 4
    unit: 上场单位/场
    added: 2026-06-13
    revised: ""

  - name: STARTING_CREW
    status: active
    source: design/gdd/unit-data-system.md
    referenced_by:
      - design/gdd/unit-data-system.md
      - design/gdd/game-concept.md   # 2 人起航（2026-06-13 用户拍板）
    value: 2
    unit: 船员
    added: 2026-06-13
    revised: ""

  - name: crew_power_band
    status: active
    source: design/gdd/unit-data-system.md
    referenced_by:
      - design/gdd/unit-data-system.md
    value: "13–16"
    unit: power_score
    added: 2026-06-13
    revised: ""

  - name: ROUND_LIMIT
    status: active
    source: design/gdd/turn-management-system.md
    referenced_by:
      - design/gdd/turn-management-system.md
    value: 8
    unit: 轮次/场
    notes: "失败条件上限。推荐基线值 8，安全范围 [5,12]；垂直切片阶段用真实职业数据校准。"
    added: 2026-06-13
    revised: ""

  - name: HEAL_AMOUNT
    status: active
    source: design/gdd/battle-resolution-system.md
    referenced_by:
      - design/gdd/battle-resolution-system.md
    value: 3
    unit: HP/次
    notes: "医师·愈的每次治疗量。可调旋钮，安全范围 1–6。
      action_weight=2 的定价依据为此绝对值，若大幅下调须重算 power_score。"
    added: 2026-06-13
    revised: ""

  - name: GUARD_DIVISOR
    status: active
    source: design/gdd/battle-resolution-system.md
    referenced_by:
      - design/gdd/battle-resolution-system.md
    value: 2
    unit: 除数（无单位）
    notes: "铁壁·挡减伤公式的除数。floor(dmg/2)。安全范围 2–4。"
    added: 2026-06-13
    revised: ""

  - name: GUNNER_MIN_RANGE
    status: active
    source: design/gdd/battle-resolution-system.md
    referenced_by:
      - design/gdd/battle-resolution-system.md
    value: 2
    unit: 曼哈顿距离（格）
    notes: "炮手普通攻击最小曼哈顿距离。低于此值则攻击被拒绝。职业动词·轰不受此约束。"
    added: 2026-06-13
    revised: ""

  - name: PUSH_DISTANCE
    status: active
    source: design/gdd/battle-resolution-system.md
    referenced_by:
      - design/gdd/battle-resolution-system.md
    value: 2
    unit: 格
    notes: "航海士·移的最大位移格数。实际位移 actual_distance ∈ [0, PUSH_DISTANCE]。"
    added: 2026-06-13
    revised: ""

  - name: AURA_VALUE
    status: active
    source: design/gdd/battle-resolution-system.md
    referenced_by:
      - design/gdd/battle-resolution-system.md
    value: 1
    unit: 伤害/次
    notes: "乐手·奏的光环每次攻击加伤。安全范围 1–2（2 搭配 MAX_MODIFIER_SUM=2 须验证不破坏两发击杀保证）。"
    added: 2026-06-13
    revised: ""

  - name: MAX_MODIFIER_SUM
    status: active
    source: design/gdd/battle-resolution-system.md
    referenced_by:
      - design/gdd/battle-resolution-system.md
      - design/gdd/adjacency-bond-system.md   # BOND_ELITE=2 = MAX_MODIFIER_SUM（已在 Formulas 中确认）
    value: 2
    unit: 伤害（单次攻击上限）
    notes: "相邻羁绊系统单次攻击最大注入修正值。高危旋钮——调高可能破坏两发击杀保证。
      adjacency-bond-system.md 已确认 BOND_ELITE=2=MAX_MODIFIER_SUM（精英配对单伙伴即封顶）。"
    added: 2026-06-13
    revised: "2026-06-14"   # referenced_by 添加 adjacency-bond-system.md

  - name: BOND_BASE
    status: active
    source: design/gdd/adjacency-bond-system.md
    referenced_by:
      - design/gdd/adjacency-bond-system.md
    value: 1
    unit: 伤害修正器/通用配对
    notes: "任意相邻友方的通用羁绊加成值。安全范围 0–2。
      调至 2 则等同 MAX_MODIFIER_SUM，1 名普通友方即封顶，削减 BOND_ELITE 差异化价值。"
    added: 2026-06-14
    revised: ""

  - name: BOND_ELITE
    status: active
    source: design/gdd/adjacency-bond-system.md
    referenced_by:
      - design/gdd/adjacency-bond-system.md
    value: 2
    unit: 伤害修正器/精英配对
    notes: "精英职业配对（6 对）的羁绊加成值。须 ≥ BOND_BASE。当前值 = MAX_MODIFIER_SUM，
      单名精英伙伴即封顶修正器上限。安全范围 1–3（调至 3 则超过上限，截断后等同 2）。"
    added: 2026-06-14
    revised: ""

  - name: ISLAND_COUNT_MAX
    status: active
    source: design/gdd/route-recruitment-system.md
    referenced_by:
      - design/gdd/route-recruitment-system.md
    value: 5
    unit: 岛屿/run
    notes: "一次 run 的总岛屿数（含末岛头目战）。垂直切片阶段基线值 5（4 次招募机会）；Full Vision 目标 7（满足 STARTING_CREW=2+6次招募=MAX_CREW=8）。安全范围 [4,7]。"
    added: 2026-06-17
    revised: ""

  - name: RECRUIT_OFFER_COUNT
    status: active
    source: design/gdd/route-recruitment-system.md
    referenced_by:
      - design/gdd/route-recruitment-system.md
    value: 3
    unit: 候选/次招募
    notes: "每次招募阶段展示的候选船员数量（三选一）。安全范围 [2,4]；=2 选择感弱；=4 分析瘫痪风险。"
    added: 2026-06-17
    revised: ""

  - name: BOND_GAUGE_MAX
    status: active
    source: design/gdd/bond-gauge-burst-system.md
    referenced_by:
      - design/gdd/bond-gauge-burst-system.md
      - design/gdd/battle-hud-system.md   # gauge_fill_ratio = bond_gauge_current / BOND_GAUGE_MAX
    value: 10
    unit: 充能点
    notes: "羁绊槽满槽值（原型验证值）。安全范围 [5, 20]；垂直切片阶段以真实职业/关卡数据校准。
      battle-hud-system 只读引用此值渲染槽条填充比例——调整须两 GDD 同步。"
    added: 2026-06-17
    revised: ""

